name: domu
description: "DOMU"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0-16.0.dev

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  flutter_bloc: ^9.1.1
  freezed_annotation: ^2.4.4
  firebase_core: ^4.4.0
  firebase_remote_config: ^6.1.4
  firebase_messaging: ^16.1.1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  get_it: ^9.2.0
  flutter_svg: ^2.2.3
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
     - family: Sora
       fonts:
         - asset: assets/fonts/Sora-Light.ttf
           weight: 300
         - asset: assets/fonts/Sora-Regular.ttf
           weight: 400
         - asset: assets/fonts/Sora-Medium.ttf
           weight: 500
         - asset: assets/fonts/Sora-SemiBold.ttf
           weight: 600
         - asset: assets/fonts/Sora-Bold.ttf
           weight: 700
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
